name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  version-sync:
    # Fail fast if the package version drifts across csproj, README, and
    # CHANGELOG. A crypto-adjacent package shipping inconsistent version
    # strings is a trust signal we never want to send.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check version is in sync across csproj/README/CHANGELOG
        run: bash scripts/check-version-sync.sh

  format:
    # `dotnet format` is authoritative — fail the build on any drift.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - name: Restore
        run: dotnet restore
      - name: Verify formatting
        run: dotnet format --verify-no-changes --no-restore

  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build (Release, warnings as errors)
        run: dotnet build -c Release --no-restore

      # The native ML-KEM / ML-DSA primitives require OpenSSL 3.5+. Stock GitHub
      # runners may ship an older OpenSSL on Linux, in which case the post-quantum
      # tests SKIP THEMSELVES (with a stated reason) rather than fail. The Linux
      # lane is therefore "portability + non-PQ paths"; cryptographic assurance
      # lives on the Windows lane and the linux-pq-required job below.
      - name: Report OpenSSL version
        if: runner.os == 'Linux'
        run: openssl version

      - name: Test (Release)
        shell: bash
        run: |
          set -o pipefail
          dotnet test -c Release --no-build --logger "console;verbosity=minimal" | tee test-output.log

      # On Windows the runner has the native ML-KEM / ML-DSA primitives, so
      # every PqcFact test MUST run. If anything skipped, we are no longer
      # proving the cryptographic paths in CI — fail the job.
      - name: Require zero skipped tests on Windows (PQ paths must run)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          summary=$(grep -E '^(Passed!|Failed!)' test-output.log | tail -1)
          echo "Test summary line: $summary"
          if [[ -z "$summary" ]]; then
            echo "::error::Could not locate the dotnet test summary line."
            exit 1
          fi
          skipped=$(echo "$summary" | grep -oE 'Skipped:[[:space:]]*[0-9]+' | grep -oE '[0-9]+' | tail -1)
          if [[ -z "$skipped" ]]; then
            echo "::error::Could not extract Skipped count from test output."
            exit 1
          fi
          if [[ "$skipped" -ne 0 ]]; then
            echo "::error::Windows CI lane is the PQ-required lane; $skipped test(s) skipped."
            echo "This usually means the ML-KEM/ML-DSA primitives weren't available to the runner."
            exit 1
          fi
          echo "PQ-required check passed: 0 skipped tests on Windows."

  linux-pq-required:
    # Linux PQ-pinned lane: installs OpenSSL 3.5+ via conda-forge and runs the
    # full suite with LD_LIBRARY_PATH pointed at it, then asserts zero skips.
    # Stands alongside the Windows lane as cross-platform proof that the
    # ML-KEM / ML-DSA paths actually executed in CI.
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Set up miniconda + OpenSSL 3.5
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: false
          activate-environment: pq
          channels: conda-forge

      - name: Install OpenSSL 3.5+ from conda-forge
        run: |
          conda install -y -n pq -c conda-forge "openssl>=3.5"
          "$CONDA/envs/pq/bin/openssl" version
          echo "PQ_OPENSSL_LIB=$CONDA/envs/pq/lib" >> "$GITHUB_ENV"

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build -c Release --no-restore

      - name: Test (Release) with PQ-capable OpenSSL on LD_LIBRARY_PATH
        run: |
          set -o pipefail
          LD_LIBRARY_PATH="$PQ_OPENSSL_LIB${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" \
            dotnet test -c Release --no-build --logger "console;verbosity=minimal" \
            | tee test-output.log

      - name: Require zero skipped tests on Linux (PQ paths must run)
        run: |
          set -euo pipefail
          summary=$(grep -E '^(Passed!|Failed!)' test-output.log | tail -1)
          echo "Test summary line: $summary"
          if [[ -z "$summary" ]]; then
            echo "::error::Could not locate the dotnet test summary line."
            exit 1
          fi
          skipped=$(echo "$summary" | grep -oE 'Skipped:[[:space:]]*[0-9]+' | grep -oE '[0-9]+' | tail -1)
          if [[ -z "$skipped" ]]; then
            echo "::error::Could not extract Skipped count from test output."
            exit 1
          fi
          if [[ "$skipped" -ne 0 ]]; then
            echo "::error::Linux PQ-required lane: $skipped test(s) skipped — OpenSSL 3.5+ should make ML-KEM/ML-DSA available."
            exit 1
          fi
          echo "PQ-required check passed on Linux: 0 skipped tests."

  aot-publish:
    # Proves the library compiles AOT-clean end-to-end on every supported
    # platform. The tiny tests/PostQuantum.AspNetCore.AotSmokeTest project
    # exercises the public surface; running `dotnet publish -p:PublishAot=true`
    # against it surfaces any unannotated reflection in the library as an IL
    # trim error (TreatWarningsAsErrors=true escalates them).
    #
    # Why all three platforms: AOT linkers differ — clang on Linux, link.exe
    # via the MSVC Build Tools on Windows, ld64 on macOS. A library that
    # AOT-publishes cleanly on one can still break on another (RID-specific
    # code paths, P/Invoke shape, native-library activation). PR-time catch
    # beats post-release surprise.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - name: AOT publish smoke test
        shell: bash
        run: |
          set -euo pipefail
          dotnet publish tests/PostQuantum.AspNetCore.AotSmokeTest/PostQuantum.AspNetCore.AotSmokeTest.csproj \
            -c Release \
            --runtime "${{ matrix.rid }}" \
            -p:PublishAot=true

  coverage:
    # Coverlet via the test project's `coverlet.collector` produces a
    # Cobertura XML report. reportgenerator (a global tool) turns it into
    # a Markdown summary in the GitHub Actions step output and enforces
    # a line-coverage threshold; the build fails if line coverage drops
    # below 75%, which is the floor the project targets during preview.
    # The number isn't sacred — adjust deliberately when something
    # legitimately hard-to-cover lands, and bump up when the suite catches
    # up to new code.
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Set up miniconda + OpenSSL 3.5
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: false
          activate-environment: pq
          channels: conda-forge

      - name: Install OpenSSL 3.5+ from conda-forge
        run: |
          conda install -y -n pq -c conda-forge "openssl>=3.5"
          echo "LD_LIBRARY_PATH=$CONDA/envs/pq/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Install reportgenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Test with coverage
        run: |
          set -o pipefail
          dotnet test tests/PostQuantum.AspNetCore.Tests/PostQuantum.AspNetCore.Tests.csproj \
            -c Release \
            --collect:"XPlat Code Coverage" \
            --results-directory coverage \
            --logger "console;verbosity=minimal"

      - name: Generate coverage report and enforce threshold
        run: |
          set -euo pipefail
          report=$(find coverage -name 'coverage.cobertura.xml' | head -1)
          if [[ -z "$report" ]]; then
            echo "::error::No coverage report found."
            exit 1
          fi
          reportgenerator \
            "-reports:$report" \
            "-targetdir:coverage-report" \
            "-reporttypes:MarkdownSummaryGithub;TextSummary" \
            "-assemblyfilters:+PostQuantum.AspNetCore"

          if [[ -f coverage-report/SummaryGithub.md ]]; then
            cat coverage-report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"
          fi

          # Parse line-coverage % from the text summary and enforce floor.
          line_cov=$(grep -oP 'Line coverage:\s*\K[0-9.]+' coverage-report/Summary.txt | head -1)
          echo "Measured line coverage: ${line_cov}%"
          floor=75
          if (( $(echo "$line_cov < $floor" | bc -l) )); then
            echo "::error::Line coverage ${line_cov}% is below the ${floor}% floor."
            exit 1
          fi
          echo "Coverage gate passed (${line_cov}% >= ${floor}%)."

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: coverage-report/
          if-no-files-found: ignore
          retention-days: 14

  pack-verify:
    # Make sure the package itself builds cleanly on every PR — catches
    # metadata regressions long before a release tag is pushed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Install CycloneDX SBOM tool
        run: dotnet tool install --global CycloneDX

      - name: Pack (Release)
        run: dotnet pack src/PostQuantum.AspNetCore/PostQuantum.AspNetCore.csproj -c Release -o artifacts

      - name: Upload package artifact
        uses: actions/upload-artifact@v5
        with:
          name: nuget-package-${{ github.sha }}
          path: artifacts/*.*nupkg
          if-no-files-found: error
          retention-days: 14
