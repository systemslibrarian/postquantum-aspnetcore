name: Release

# Builds, packs, and attests every `v*` tag push (transparency signals —
# SBOM, SHA256SUMS, build-provenance attestations — get published as
# workflow artifacts). The actual nuget.org PUSH is gated behind a
# manual `workflow_dispatch` with `publish: true`. A tag push alone will
# NEVER push to nuget.org — only the explicit manual dispatch will.
#
# Authentication is NuGet Trusted Publishing (OIDC): the publish job
# exchanges the GitHub Actions OIDC token for a short-lived nuget.org API
# key via the NuGet/login action — there is NO long-lived NUGET_API_KEY
# secret. A matching Trusted Publishing policy must exist on nuget.org
# (account → Trusted Publishing) bound to:
#   repository owner = systemslibrarian
#   repository       = postquantum-aspnetcore
#   workflow file    = release.yml
#   environment      = nuget-publish   (optional, recommended)
# The nuget.org account username that owns the policy is supplied via the
# `NUGET_USER` repository variable (Settings → Secrets and variables →
# Actions → Variables). It is not a secret.
#
# To publish via CI:
#   Actions → Release → Run workflow → check "Push packages to nuget.org"
# That run requires the `nuget-publish` GitHub Environment + an approver.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish:
        description: 'Push packages to nuget.org after packing (otherwise this run only packs)'
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write       # for GitHub OIDC-backed build provenance attestations
  attestations: write   # for the attest-build-provenance action

jobs:
  pack:
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.version.outputs.package_version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history for deterministic SourceLink

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Resolve and verify package version
        id: version
        run: |
          set -euo pipefail
          csproj_version=$(grep -oP '(?<=<Version>)[^<]+' src/PostQuantum.AspNetCore/PostQuantum.AspNetCore.csproj)
          # The Redis companion ships in lockstep — hold it to that.
          redis_version=$(grep -oP '(?<=<Version>)[^<]+' src/PostQuantum.AspNetCore.RedisReplayCache/PostQuantum.AspNetCore.RedisReplayCache.csproj)
          if [ "$redis_version" != "$csproj_version" ]; then
            echo "::error::RedisReplayCache version ($redis_version) does not match PostQuantum.AspNetCore ($csproj_version) — they release in lockstep."
            exit 1
          fi
          # When triggered by a tag push, verify the tag matches the csproj.
          # When triggered by workflow_dispatch, there's no tag — accept the
          # csproj version as the source of truth.
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            tag="${GITHUB_REF_NAME#v}"
            if [ "$tag" != "$csproj_version" ]; then
              echo "::error::Tag version ($tag) does not match csproj <Version> ($csproj_version)."
              exit 1
            fi
          fi
          echo "package_version=$csproj_version" >> "$GITHUB_OUTPUT"

      - name: Install CycloneDX SBOM tool
        run: dotnet tool install --global CycloneDX

      - name: Build (Release)
        run: dotnet build -c Release

      - name: Test (Release)
        run: dotnet test -c Release --no-build

      # Both packages ship in lockstep. Earlier releases packed only the main
      # package here (the Redis companion went out via the maintainer's manual
      # CLI path); from 1.0.0 the CI pack covers both.
      - name: Pack — PostQuantum.AspNetCore
        run: dotnet pack src/PostQuantum.AspNetCore/PostQuantum.AspNetCore.csproj -c Release --no-build -o artifacts

      - name: Pack — RedisReplayCache companion
        run: dotnet pack src/PostQuantum.AspNetCore.RedisReplayCache/PostQuantum.AspNetCore.RedisReplayCache.csproj -c Release --no-build -o artifacts

      - name: Generate top-level CycloneDX SBOM (in addition to the per-nupkg one)
        run: |
          set -euo pipefail
          dotnet CycloneDX src/PostQuantum.AspNetCore/PostQuantum.AspNetCore.csproj \
              --output artifacts \
              --filename bom.json \
              --json
          echo "---- SBOM head ----"
          head -c 1024 artifacts/bom.json
          echo
          echo "-------------------"

      - name: Compute SHA-256 of artifacts for transparency
        run: |
          set -euo pipefail
          (cd artifacts && sha256sum *.nupkg *.snupkg bom.json | tee SHA256SUMS.txt)
          echo "---- SHA256SUMS.txt ----"
          cat artifacts/SHA256SUMS.txt
          echo "------------------------"

      - name: Generate build-provenance attestation for the .nupkg files
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: "artifacts/*.nupkg"

      - name: Generate build-provenance attestation for the SBOM
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: "artifacts/bom.json"

      - name: Upload artifacts to the workflow run
        uses: actions/upload-artifact@v5
        with:
          name: nuget-package
          path: |
            artifacts/*.*nupkg
            artifacts/bom.json
            artifacts/SHA256SUMS.txt
          if-no-files-found: error

  publish:
    needs: pack
    # NEVER runs on tag push. Requires an explicit manual workflow_dispatch
    # with `publish: true`, plus the `nuget-publish` environment's required
    # reviewers — gated twice so it can't fire by accident.
    if: github.event_name == 'workflow_dispatch' && inputs.publish == true
    environment: nuget-publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write       # required: mint the GitHub OIDC token for NuGet/login
    env:
      NUGET_SIGNING_CERT: ${{ secrets.NUGET_SIGNING_CERT }}
      NUGET_SIGNING_CERT_PASSWORD: ${{ secrets.NUGET_SIGNING_CERT_PASSWORD }}
    steps:
      # Checkout is needed so global.json exists for setup-dotnet below —
      # this job otherwise only consumes the pack job's artifacts.
      - uses: actions/checkout@v5

      - name: Download package artifacts
        uses: actions/download-artifact@v5
        with:
          name: nuget-package
          path: artifacts

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      # Trusted Publishing: exchange the GitHub OIDC token for a short-lived
      # nuget.org API key. Requires `id-token: write` (above) and a matching
      # Trusted Publishing policy on nuget.org (see the header comment). The
      # minted key is exposed to later steps as steps.nuget-login.outputs.NUGET_API_KEY.
      - name: NuGet trusted-publishing login (OIDC)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      # Optional: author code-sign the .nupkg files when a code-signing cert
      # is provided. If the secret is absent we log it and continue (with the
      # repo-signing-only stance documented in KNOWN-GAPS.md). When the secret
      # is present, the cert is materialised to a temp file, used by
      # `dotnet nuget sign`, and the file is removed in cleanup.
      - name: Author code-sign packages (if certificate available)
        run: |
          set -euo pipefail
          if [ -z "${NUGET_SIGNING_CERT}" ]; then
            echo "NUGET_SIGNING_CERT not set — packages will rely on nuget.org repository signing only."
            echo "See KNOWN-GAPS.md for the rationale and roadmap."
            exit 0
          fi

          cert_path=$(mktemp --suffix=.pfx)
          echo "$NUGET_SIGNING_CERT" | base64 -d > "$cert_path"
          chmod 600 "$cert_path"

          echo "Author signing artifacts/*.nupkg ..."
          dotnet nuget sign artifacts/*.nupkg \
              --certificate-path "$cert_path" \
              --certificate-password "$NUGET_SIGNING_CERT_PASSWORD" \
              --timestamper "http://timestamp.digicert.com" \
              --overwrite

          shred -u "$cert_path" || rm -f "$cert_path"
          echo "::notice::Packages author-signed."

      # NuGet.org also applies repository signing on push. Build-provenance
      # attestations (in the pack job above) are an independent transparency
      # signal — anyone can verify with `gh attestation verify <file>
      # --repo systemslibrarian/postquantum-aspnetcore`.
      #
      # Two explicit sequential pushes, not a glob: RedisReplayCache's .nuspec
      # lists PostQuantum.AspNetCore as a runtime dependency, so the main
      # package goes first to narrow the window where a consumer resolves the
      # companion before its dependency has indexed. `dotnet nuget push`
      # uploads each .nupkg's adjacent .snupkg automatically; `--skip-duplicate`
      # keeps re-runs idempotent.
      - name: Push PostQuantum.AspNetCore first
        env:
          PKG_VERSION: ${{ needs.pack.outputs.package_version }}
        run: >
          dotnet nuget push "artifacts/PostQuantum.AspNetCore.${PKG_VERSION}.nupkg"
          --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Push RedisReplayCache companion (depends on the main package)
        env:
          PKG_VERSION: ${{ needs.pack.outputs.package_version }}
        run: >
          dotnet nuget push "artifacts/PostQuantum.AspNetCore.RedisReplayCache.${PKG_VERSION}.nupkg"
          --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
